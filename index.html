
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MYT Enterprises — Accelerated Transformation</title>
    <!-- Google Fonts for Preset A: Organic Tech -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Outfit:wght@300;400;600&family=Cormorant+Garamond:ital,wght@1,400;1,600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              moss: '#2E4036',
              clay: '#CC5833',
              cream: '#F2F0E9',
              charcoal: '#1A1A1A',
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
              outfit: ['Outfit', 'sans-serif'],
              serif: ['"Cormorant Garamond"', 'serif'],
              mono: ['"IBM Plex Mono"', 'monospace'],
            },
            borderRadius: {
                '4xl': '2rem',
                '5xl': '3rem',
            }
          },
        },
      }
    </script>
    <style>
        body { background-color: #F2F0E9; color: #1A1A1A; overflow-x: hidden; }
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.05;
        }
        .magnetic-btn {
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .magnetic-btn:hover {
            transform: scale(1.03) translateY(-1px);
        }
        .reveal-text { opacity: 0; transform: translateY(30px); }
        .glass-nav {
            background: rgba(242, 240, 233, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(46, 64, 54, 0.1);
        }
        .card-stack-base {
            transition: transform 0.5s ease, filter 0.5s ease, opacity 0.5s ease;
        }
    </style>
  </head>
  <body>
    <svg class="noise-overlay">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch" />
      </filter>
      <rect width="100%" height="100%" filter="url(#noiseFilter)" />
    </svg>
    <div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  </body>
</html>
