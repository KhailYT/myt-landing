<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MYT Enterprises — Accelerated Transformation</title>
    
    <!-- Meta Tags for SEO -->
    <meta name="description" content="MYT Enterprises engineers tangible ROI through specialized methodologies and objective insights.">
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Tailwind CSS (via CDN for rapid deployment, though usually handled via npm in Vite) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              moss: '#2E4036',
              clay: '#CC5833',
              cream: '#F2F0E9',
              charcoal: '#1A1A1A',
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
              serif: ['"Cormorant Garamond"', 'serif'],
              mono: ['"IBM Plex Mono"', 'monospace'],
            },
          },
        },
      }
    </script>

    <!-- GSAP & ScrollTrigger CDN (Fallback for the logic in main.jsx) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  </head>
  <body>
    <!-- React Root Entry -->
    <div id="root"></div>

    <!-- Main Entry Point for Vite -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
